name: CI

on:
  push:
    branches: [main, "chore/**"]
  pull_request:

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r backend/requirements.txt
      - name: Pytest
        run: python -m pytest -q

  frontend:
    name: Frontend (lint + typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: ""

  e2e:
    name: E2E (Playwright critical path)
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r backend/requirements.txt
      - name: Install frontend
        working-directory: frontend
        run: npm ci
      - name: Build frontend
        working-directory: frontend
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://127.0.0.1:8000
      - name: Install Playwright Chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium
      - name: Start API
        run: |
          nohup python -m uvicorn backend.main:app --host 127.0.0.1 --port 8000 > /tmp/viastat-api.log 2>&1 &
          for i in $(seq 1 30); do
            curl -sf http://127.0.0.1:8000/health && break
            sleep 1
          done
          curl -sf http://127.0.0.1:8000/health
          curl -sf http://127.0.0.1:8000/api/network/geojson | head -c 200
      - name: Start frontend
        working-directory: frontend
        run: |
          nohup npm run start -- --hostname 127.0.0.1 --port 3000 > /tmp/viastat-fe.log 2>&1 &
          for i in $(seq 1 40); do
            curl -sf http://127.0.0.1:3000/ >/dev/null && break
            sleep 1
          done
          curl -sf http://127.0.0.1:3000/ >/dev/null
        env:
          NEXT_PUBLIC_API_URL: http://127.0.0.1:8000
      - name: Playwright
        working-directory: frontend
        run: npm run test:e2e
        env:
          DEMO_BASE_URL: http://127.0.0.1:3000
          NEXT_PUBLIC_API_URL: http://127.0.0.1:8000
